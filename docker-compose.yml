version: '3.9'

services:
  qdrant:
    image: qdrant/qdrant:latest
    platform: linux/amd64
    container_name: qdrant
    ports:
      - '6333:6333'
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - rag_network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    platform: linux/amd64
    container_name: rag_api
    ports:
      - '3000:3000'
    env_file:
      - .env
    depends_on:
      - qdrant
    networks:
      - rag_network

volumes:
  qdrant_data:

networks:
  rag_network:
    driver: bridge
